<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.ico">
  <title>ふりするフリスル</title>
</head>
<style>
    body {
        background-color: #1c122e;
        margin: 20px;
    }
    .color-scheme {
        color: #555555;
    }
</style>
<style class: defaultStyle>
    .font-family {
        font-family: 'Arial', sans-serif;
    }
    .font-size {
        font-size: 16px;
    }
    .font-color {
        color: #ffffff;
    }
</style>
<style class: headingStyle>
    h1 {
        font-size: 36px;
        color: #ffffff;
    }
    h2 {
        font-size: 28px;
        color: #ffffff;
    }

    .align-center {
        text-align: center;
    }
    .align-left {
        text-align: left;
    }
    .align-right {
        text-align: right;
    }
</style>
<style class: buttonStyle>
    button {
        background-color: #5a5668;
        border: none;
        color: white;
        padding: 10px 20px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 4px 2px;
        cursor: pointer;
        border-radius: 8px;
    }
    button:hover {
        background-color: #4a4758;
    }
</style>
<body>
    <h1 class="align-center">ふりするフリスル</h1>
    <h2 class="align-center">HEW用ゲーム紹介ページ</h2>
    <div class="font-family font-size font-color">
        <p>ここはふりするフリスルのウェブサイトです。</p>
    </div>

    <!-- 移動用ボタン -->
    <button class="buttonStyle" onclick="navigateToMippou()">開発秘話</button>
</body>
<script>
    // ページ移動
    function navigateToMippou() {
        window.location.href = "diary.html";
    }
</script>
</html>
