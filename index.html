<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.ico">
  <title>ふりするフリスル</title>
</head>
<style>
    body {
        background-color: #1c122e;
        margin: 20px;
    }
    .color-scheme {
        color: #555555;
    }
</style>
<style class: defaultStyle>
    .font-family {
        font-family: 'Arial', sans-serif;
    }
    .font-size {
        font-size: 16px;
    }
    .font-color {
        color: #ffffff;
    }
</style>
<style class: headingStyle>
    h1 {
        font-size: 36px;
        color: #ffffff;
    }
    h2 {
        font-size: 28px;
        color: #ffffff;
    }

    .align-center {
        text-align: center;
    }
    .align-left {
        text-align: left;
    }
    .align-right {
        text-align: right;
    }

    .hedding-underline {
        text-decoration: underline;
    }

    .hedding-hr {
        border: 0;
        height: 5px;
        width: 90%;
        background: #ffffff;
        margin-left: 0px;
    }
</style>
<style class: buttonStyle>
    button {
        background-color: #5a5668;
        border: none;
        color: white;
        padding: 10px 20px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 4px 2px;
        cursor: pointer;
        border-radius: 8px;
    }
    button:hover {
        background-color: #4a4758;
    }
</style>
<body class="font-family font-size font-color color-scheme">
    <h1 class="align-center">ふりするフリスル</h1>
    <h2 class="align-center">HEW用ゲーム紹介ページ</h2>

    <h2 class="align-left">ゲーム紹介動画</h2>
    <hr class="hedding-hr">
    <div class="align-left">
        <video width="640" height="360" controls>
            <!-- <source src="game_intro.mp4" type="video/mp4"> -->
        </video>
    </div>

    <h2 class="align-left">キャラクター紹介</h2>
    <hr class="hedding-hr">
    <div class="align-left">
        <img src="furisuru_prof.png" alt="ふりする" width="400">
    </div>


    <!-- 移動用ボタン -->
    <button class="buttonStyle" onclick="navigateToMippou()">開発秘話</button>
</body>
<script>
    // ページ移動
    function navigateToMippou() {
        window.location.href = "diary.html";
    }
</script>
</html>
