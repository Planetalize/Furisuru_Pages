<!DOCTYPE html>

<style>
    body {
        background-color: #1c122e;
        font-family: 'Arial', sans-serif;
        margin: 20px;
    }
    .color-scheme {
        color: #555555;
    }
</style>
<style class: sideStyle>
    .sidebar {
        width: 200px;
        height: 100%;
        position: fixed;
        top: 0;
        left: 0;
        background-color: #2c223e;
        padding-top: 20px;
    }
    .sidebar a {
        padding: 10px 15px;
        text-decoration: none;
        font-size: 18px;
        color: #ffffff;
        display: block;
    }
    .sidebar a:hover {
        background-color: #575060;
    }
</style>
<style class: mainStyle>
    .main-content {
        margin-left: 200px;
        padding: 20px;
    }
</style>
<style class: headingStyle>
    h1 {
        font-size: 36px;
        color: #ffffff;
    }
    h2 {
        font-size: 28px;
        color: #ffffff;
    }

    .align-center {
        text-align: center;
    }
    .align-left {
        text-align: left;
    }
    .align-right {
        text-align: right;
    }

    .hedding-underline {
        text-decoration: underline;
    }

    .hedding-hr {
        border: 0;
        height: 5px;
        width: 100%;
        background: #ffffff;
        margin-left: 0px;
    }
</style>
<style class: buttonStyle>
    button {
        background-color: #5a5668;
        border: none;
        color: white;
        padding: 10px 20px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 4px 2px;
        cursor: pointer;
        border-radius: 8px;
    }
    button:hover {
        background-color: #4a4758;
    }
</style>
<body>
    <div class="sidebar">
        <a href="index.html">ホーム</a>

    <hr class="hedding-hr">
    <div class="align-left">
        <video width="640" height="360" controls>
            <!-- <source src="game_intro.mp4" type="video/mp4"> -->
        </video>

    <hr class="hedding-hr">
    <div class="align-left">
        <img src="furisuru_prof.png" alt="ふりする" width="400">

    <!-- 移動用ボタン -->
    <button class="buttonStyle" onclick="navigateToMippou()">開発秘話</button>
    </div>

<script>
